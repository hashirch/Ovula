services:
  - type: web
    name: ovula-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 43200
      - key: DATABASE_URL
        fromDatabase:
          name: ovula-db
          property: connectionString
      - key: MODEL_TYPE
        value: groq_api
      - key: GROQ_MODEL
        value: llama-3.1-70b-versatile
      - key: MAX_CHAT_HISTORY
        value: 50
      - key: MAX_RESPONSE_LENGTH
        value: 512
      - key: EMAIL_BACKEND
        value: smtp
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        value: ovula2025@gmail.com
      - key: SMTP_PASSWORD
        value: hnqzfgwfzfxsuton
      - key: FROM_EMAIL
        value: ovula2025@gmail.com
      - key: APP_NAME
        value: Ovula
      # Set APP_URL to your frontend Vercel URL after deploying
      - key: APP_URL
        value: https://ovula.vercel.app
      - key: GROQ_API_KEY
        sync: false  # Set this manually in Render dashboard

databases:
  - name: ovula-db
    databaseName: ovula
    plan: free
    region: oregon
